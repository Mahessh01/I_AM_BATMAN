<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Batman Reveal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <div class="background"></div>

    <div class="hero">
        <div class="reveal" id="reveal"></div>
    </div>

    <div class="overlay">

        <h1 class="bg-text">BATMAN</h1>

        <div class="content">

            <div class="left-content">
                <p class="location">— GOTHAM CITY</p>
                <h2>THE DARK<br>KNIGHT</h2>
                <p>
                    He is vengeance. He is the night.
                    Born from tragedy, forged in shadow.
                </p>
            </div>

            <div class="right-content">
                <h2>THE MAN<br>BEHIND THE MASK</h2>
                <p>
                    Billionaire by day. Guardian by night.
                    Gotham's greatest hero.
                </p>
            </div>

        </div>

    </div>

</div>

<script src="script.js"></script>

</html>
